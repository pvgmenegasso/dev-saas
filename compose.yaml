name: dev-saas

services:
  caddy:
    image: docker.io/caddy
    container_name: caddy
    ports: 
      - "8080:80"
      - "4430:443" 
    volumes: 
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      code-service:
        condition: service_healthy
      obsidian:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
        
  code-service:
    image: code-container 
    build:
      context: ./code-container
    volumes:
      - ./container-home/vscode:/home/dev/workspace:Z
    ports:
      - "8080:8080"


  obsidian:
    image: lscr.io/linuxserver/obsidian:1.12.7
    container_name: obsidian
    volumes:
      - ./container-home/obsidian:/config/local-docs:Z
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3 
    environment:
      - TZ=Europe/Lisbon
    shm_size: "1gb"

volumes:
  code-container-data:
  caddy-data:
  caddy-config:
